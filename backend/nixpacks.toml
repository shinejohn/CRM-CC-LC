[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "php84Extensions.pdo_pgsql", "php84Extensions.redis"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-scripts"]

[phases.build]
cmds = [
  "APP_URL=http://localhost php artisan package:discover --ansi",
  "APP_URL=http://localhost php artisan config:cache",
  "APP_URL=http://localhost php artisan route:cache",
  "APP_URL=http://localhost php artisan event:cache"
]

# Note: Migrations run separately after environment variables are set
# Run via: railway run --service "CC API" "php artisan migrate --force"

[start]
cmd = "bash start.sh"


